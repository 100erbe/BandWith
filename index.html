<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="theme-color" content="#E6E5E1" />
    <link rel="stylesheet" href="https://use.typekit.net/mzr4hzv.css">
    <title>BandWith</title>
    <script>
      // ═══ Dark-mode flash prevention — runs before any paint ═══
      (function() {
        var stored = null;
        try { stored = localStorage.getItem('bandwith-theme-mode'); } catch(e) {}
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var isDark = stored === 'dark' || (stored !== 'light' && prefersDark);
        if (isDark) {
          document.documentElement.classList.add('dark');
          document.querySelector('meta[name="theme-color"]')?.setAttribute('content', '#050505');
        }
      })();
    </script>
    <style>
      html, body {
        margin: 0; padding: 0; height: 100%; overflow: hidden;
        overscroll-behavior: none;
        -webkit-user-select: none; user-select: none;
        -webkit-tap-highlight-color: transparent;
        background: var(--background, #E6E5E1);
      }
      ::-webkit-scrollbar { display: none; }
      * { -ms-overflow-style: none; scrollbar-width: none; }
      :root { color-scheme: light; }
      :root.dark { color-scheme: dark; }
      #root {
        height: 100%; overflow-y: scroll; overflow-x: hidden;
        -webkit-overflow-scrolling: touch; overscroll-behavior-y: contain;
      }
      input, textarea, select {
        -webkit-appearance: none; -moz-appearance: none; appearance: none;
        border-radius: 0; font-size: 16px;
      }
      input:-webkit-autofill, input:-webkit-autofill:hover,
      input:-webkit-autofill:focus, input:-webkit-autofill:active {
        -webkit-box-shadow: 0 0 0 30px #E6E5E1 inset !important;
        -webkit-text-fill-color: #050505 !important;
        caret-color: #050505 !important;
        transition: background-color 5000s ease-in-out 0s;
      }
      input:focus, textarea:focus, select:focus {
        outline: none; -webkit-tap-highlight-color: transparent;
      }
      #css-splash {
        position: fixed; inset: 0; z-index: 99999;
        background: var(--bg, #E6E5E1);
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        transition: opacity 0.4s ease;
      }
      .dark #css-splash {
        background: #050505;
      }
      #css-splash img {
        width: 64px; height: 64px; border-radius: 16px;
      }
      #css-splash .t {
        margin-top: 24px;
        font-family: 'neue-haas-grotesk-display', -apple-system, sans-serif;
        font-size: 28px; font-weight: 900; letter-spacing: -0.02em;
      }
    </style>
  </head>
  <body>
    <div id="css-splash">
      <img src="/brand/app-icon.png" alt="">
      <div class="t"><span id="splash-band" style="color:#050505">BAND</span><span id="splash-with" style="color:#6A0DAD">WITH</span></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
